name: Build macOS recognizer arm64

on:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macos-arm64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare logs
        run: mkdir -p logs

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip > logs/pip_install.log 2>&1
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt >> logs/pip_install.log 2>&1
          else
            python -m pip install numpy pillow ai-edge-litert pyinstaller >> logs/pip_install.log 2>&1
          fi

      - name: LiteRT import test
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY' > logs/litert_import.log 2>&1
          from ai_edge_litert.interpreter import Interpreter
          print("LiteRT import OK", Interpreter)
          PY

      - name: Build with PyInstaller
        shell: bash
        run: |
          set -euxo pipefail
          pyinstaller --clean --onedir --name recognizer \
            --add-data "dakanji/model.tflite:dakanji" \
            --add-data "dakanji/labels.txt:dakanji" \
            recognizer.py > logs/pyinstaller_build.log 2>&1

      - name: Smoke test recognizer
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x ./dist/recognizer/recognizer
          printf '%s\n' '{"cmd":"ping","id":1}' | ./dist/recognizer/recognizer > logs/recognizer_stdout.log 2> logs/recognizer_stderr.log
          cat logs/recognizer_stdout.log
          grep -q '"pong": true' logs/recognizer_stdout.log

      - name: Package AppleSiliconMac without symlinks
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf package AppleSiliconMac recognizer-AppleSiliconMac.tar.gz
          mkdir -p package
          # -L で macOS のシンボリックリンクを実体ファイル/実体フォルダとしてコピーする。
          # Windows 上で tar 展開したときの Invalid argument / Access denied を避けるため。
          rsync -aL ./dist/recognizer/ ./package/AppleSiliconMac/
          chmod +x ./package/AppleSiliconMac/recognizer
          find ./package/AppleSiliconMac -type l -print > logs/symlinks_after_package.log
          if [ -s logs/symlinks_after_package.log ]; then
            echo "Unexpected symlinks remain:" >&2
            cat logs/symlinks_after_package.log >&2
            exit 1
          fi
          tar -czf recognizer-AppleSiliconMac.tar.gz -C package AppleSiliconMac
          ls -lh recognizer-AppleSiliconMac.tar.gz > logs/package_ls.log

      - name: Upload recognizer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recognizer-AppleSiliconMac
          path: |
            recognizer-AppleSiliconMac.tar.gz
            logs/*.log
          if-no-files-found: warn

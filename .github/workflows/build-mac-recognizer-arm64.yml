name: Build macOS recognizer arm64

on:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macos-arm64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: |
          pwd
          ls -la
          test -f recognizer.py
          test -f dakanji/model.tflite
          test -f dakanji/labels.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install numpy pillow ai-edge-litert pyinstaller
          fi

      - name: LiteRT import test
        run: |
          python - <<'PY'
          from ai_edge_litert.interpreter import Interpreter
          print('ai_edge_litert import OK:', Interpreter)
          PY

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onedir --name recognizer recognizer.py \
            --add-data "dakanji/model.tflite:dakanji" \
            --add-data "dakanji/labels.txt:dakanji" \
            --collect-all ai_edge_litert

      - name: Rename output folder to AppleSiliconMac
        run: |
          rm -rf ./dist/AppleSiliconMac
          mv ./dist/recognizer ./dist/AppleSiliconMac
          chmod +x ./dist/AppleSiliconMac/recognizer
          find ./dist/AppleSiliconMac -maxdepth 2 -type f | head -50

      - name: Smoke test ping
        run: |
          printf '%s\n' '{"cmd":"ping","id":1}' | ./dist/AppleSiliconMac/recognizer

      - name: Smoke test recognize minimal
        run: |
          printf '%s\n' '{"cmd":"recognize","id":2,"nBest":3,"strokes":[[[20,20],[180,180]]]}' | ./dist/AppleSiliconMac/recognizer

      - name: Package
        run: |
          tar -C dist -czf recognizer-AppleSiliconMac.tar.gz AppleSiliconMac
          ls -lh recognizer-AppleSiliconMac.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recognizer-AppleSiliconMac
          path: recognizer-AppleSiliconMac.tar.gz
          if-no-files-found: error
